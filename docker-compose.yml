services:
  postgres:
    image: postgres:17-alpine
    command: ["postgres", "-c", "timezone=Asia/Shanghai"]
    environment:
      POSTGRES_USER: prompt_registry
      POSTGRES_PASSWORD: prompt_registry
      POSTGRES_DB: prompt_registry
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompt_registry -d prompt_registry"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - prompt_registry_postgres:/var/lib/postgresql/data

volumes:
  prompt_registry_postgres:
