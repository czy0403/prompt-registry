name: prompt-registry-test

services:
  postgres:
    image: postgres:17-alpine
    container_name: prompt-registry-test-postgres
    environment:
      POSTGRES_USER: prompt_registry
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: prompt_registry_test
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - prompt_registry_test_postgres:/var/lib/postgresql/data

volumes:
  prompt_registry_test_postgres:
